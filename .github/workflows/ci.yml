name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Single version to conserve Actions minutes; widen the matrix back to the
        # full supported range (3.11-3.13) when budget allows.
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format check (ruff format)
        run: uv run ruff format --check

      - name: Type-check (pyright strict)
        run: uv run pyright

      # -n auto parallelises across the runner's cores; loadscope keeps each module on
      # one worker so the module-scoped dbt-compile fixtures still run once apiece.
      # Coverage instrumentation adds ~45% to the test step (measured) and nothing gates
      # on it, so it runs only on the main push that publishes the artifact, keeping the
      # PR feedback path on the uninstrumented run of the same tests.
      - name: Tests (pytest)
        if: github.event_name != 'push'
        run: uv run pytest -n auto --dist loadscope

      - name: Tests (pytest with coverage)
        if: github.event_name == 'push'
        run: uv run pytest -n auto --dist loadscope --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: github.event_name == 'push' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  compiled-sqlglot:
    # Guards that dblect keeps running against sqlglot's compiled build (sqlglotc, from
    # the sqlglot[c] extra). The mypyc-compiled build cannot instantiate an interpreted
    # subclass of a sqlglot class, so this job fails if a synthetic node or schema helper
    # reintroduces such a subclass. Tests only: lint and type-check are build-independent.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --frozen --python 3.13

      - name: Install sqlglot's compiled build
        run: uv pip install "sqlglot[c]"

      - name: Tests (pytest, compiled sqlglot)
        run: uv run --no-sync pytest -n auto --dist loadscope
